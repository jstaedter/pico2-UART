name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build for ${{ matrix.board }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        # Baut automatisch 2 Varianten: Für RP2040 (pico) und RP2350 (pico2)
        board: [pico, pico2] 

    steps:
      - name: 'Check out code'
        uses: actions/checkout@v4

      - name: 'Install dependencies'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi g++-arm-none-eabi

      - name: 'Update Submodules'
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: 'Configure'
        # -B erstellt den Build-Ordner pro Board
        # -DPICO_BOARD übergibt dem Pico SDK die korrekte Zielarchitektur
        run: |
          cmake -B build-${{ matrix.board }} -S . -DPICO_BOARD=${{ matrix.board }}

      - name: 'Build'
        run: |
          cmake --build build-${{ matrix.board }} --parallel $(nproc)

      - name: 'Upload binary'
        uses: actions/upload-artifact@v4
        with:
          # Speichert die UF2-Dateien getrennt als pico und pico2 in GitHub ab
          name: uart-bridge-${{ matrix.board }}
          path: build-${{ matrix.board }}/*.uf2
          retention-days: 5
